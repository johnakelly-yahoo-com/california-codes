name: Update California Codes

on:
  schedule:
    # Run nightly at 3:00 AM Pacific (10:00 UTC)
    - cron: '0 10 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download and rebuild codes
        run: python3 update_ca_codes.py

      - name: Commit each changed code separately
        run: |
          git config user.name "John Kelly"
          git config user.email "133906045+johnakelly-yahoo-com@users.noreply.github.com"
          git add codes/
          changed_files=$(git diff --cached --name-only)
          if [ -z "$changed_files" ]; then
            echo "No changes detected."
            exit 0
          fi
          git reset HEAD codes/
          for file in codes/*.txt; do
            git add "$file"
            if ! git diff --cached --quiet; then
              code_name=$(basename "$file" .txt | sed 's/^CA Code - //')
              git commit -m "Update $code_name — $(date -u +'%B %d, %Y')"
            fi
          done
          git push
