name: Update California Codes

on:
  schedule:
    # Run nightly at 3:00 AM Pacific (10:00 UTC)
    - cron: '0 10 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download and rebuild codes
        run: python3 update_ca_codes.py

      - name: Check for changes
        id: changes
        run: |
          git add codes/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "John Kelly"
          git config user.email "133906045+johnakelly-yahoo-com@users.noreply.github.com"
          git commit -m "Update California Codes — $(date -u +'%B %d, %Y')"
          git push
